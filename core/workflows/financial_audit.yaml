name: "financial_audit"
description: "SOP for processing and auditing a new vendor invoice."

# The engine processes stages sequentially: Stage 1 -> Stage 2 -> Stage 3
stages:
  # --- t1 (Sequential Start) ---
  - stage_name: "Ingestion"
    tasks:
      - target_agent: "data_fetcher"
        instruction: "Extract the raw text and line items from the provided invoice ID."

  # --- (t2a | t2b) (Parallel Execution) ---
  - stage_name: "Verification"
    tasks:
      # Because these are in the same stage, the engine runs them CONCURRENTLY
      - target_agent: "finance_agent"
        instruction: "Read the extracted text and verify all mathematical calculations."

      - target_agent: "compliance_agent"
        instruction: "Check the vendor name against the approved enterprise vendor list."

  # --- t3 (Sequential Consolidation) ---
  - stage_name: "Consolidation"
    tasks:
      - target_agent: "evaluator"
        instruction: "Read the outputs from the finance and compliance agents. Generate a final YES/NO approval report."
